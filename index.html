<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZP Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Lacquer&family=Poiret+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Lacquer&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./scss/style.css">
</head>
<body>

   <header class="header">
    <h1 class="header__logo">ZP</h1>
    <nav class="header__nav">
        <ul class="nav-list">
            <li class="nav-list__item">SOCIALS</li>
            <li class="nav-list__item">ME:</li>
            <li class="nav-list__item">EXAMPLES</li>
            <li class="nav-list__item">CONTACTS</li>
        </ul>
    </nav>
</header>

   <section class="hero">
    <div class="hero__container">
        
        <h1 class="hero__title">WEB-DESIGN*</h1>
        
        <div class="info-block">
            <p class="info-block__value">ZHURAVLOV PAVLO</p>
            <p class="info-block__value">UX/UI</p>
            <p class="info-block__value">zhuravlevpavel2007@gmail.com</p>
        </div>

        <p class="hero__graffiti">ZHURAVLOV PAVLO</p>

    </div>
</section>

<section class="case-study">
    <div class="case-study__container">
        
        <h2 class="case-study__title">XYMERA</h2>
        
        <p class="case-study__desc">
            Posters for ukrainian musical group named “XYMERA”.
        </p>

        <img src="./img/xymera-bg.png" alt="bg" class="case-study__bg">

        <ul class="case-study__posters">
            <li class="case-study__item">
                <img src="./img/Poster-1.png" alt="Xymera Poster 1">
            </li>
            <li class="case-study__item">
                <img src="./img/Poster-2.png" alt="Xymera Poster 2">
            </li>
            <li class="case-study__item">
                <img src="./img/Poster-3.png" alt="Xymera Poster 3">
            </li>
            <li class="case-study__item">
                <img src="./img/Poster-4.png" alt="Xymera Poster 4">
            </li>
        </ul>

        <ul class="case-study__mockups">
            <li class="case-study__item">
                <img src="./img/Example-1.png" alt="Xymera on wall 1">
            </li>
            <li class="case-study__item">
                <img src="./img/Example-2.png" alt="Xymera on wall 2">
            </li>
            <li class="case-study__item">
                <img src="./img/Example-3.png" alt="Xymera on wall 3">
            </li>
            <li class="case-study__item">
                <img src="./img/Example-4.png" alt="Xymera on wall 4">
            </li>
        </ul>
    </div>
</section>

   <section class="pricing">
    <div class="pricing__container">
        
        <div class="pricing__header">
            <h2 class="pricing__title">PRICING LISTS*</h2>
            <p class="pricing__dollars">$$$</p>
        </div>

        <ul class="pricing__images">
            <li class="pricing__image-item">
                <img src="./img/Price_Mira_eng.png" alt="Price Mira">
                <p class="label-dark">NAIL.DALLIANCE</p>
            </li>
            <li class="pricing__image-item">
                <img src="./img/Price_Celestis.png" alt="Price Celestis">
                <p class="label-olive">CELESTIS.NAILS</p>
            </li>
        </ul>

    </div>
</section>

<section class="outro">
    <div class="outro__container">
        <h2 class="outro__title">THAT’S ALL FOR NOW*</h2>
        
        <p class="outro__text">SEE YOU SOON</p>
    </div>
</section>
</body>
</html>
